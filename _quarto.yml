  description: "Data Scientist · Quantitative Analyst · AI/ML Engineer"
  site-url: "https://hy86652.github.io/Simon_Yan_Portfolio"

  navbar:
    background: transparent
    foreground: "#14162a"
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "Resume"
        href: resume.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: github
        href: https://github.com/hy86652
        aria-label: GitHub
      - icon: linkedin
        href: https://linkedin.com/in/sy31
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:hyan86652@gmail.com
