  page-footer:
    left: |
      **Simon Yan** · Data Scientist & Quantitative Analyst
    center: |
      © 2026 · Built with [Quarto](https://quarto.org)
    right:
      - icon: github
        href: https://github.com/hy86652
      - icon: linkedin
        href: https://linkedin.com/in/sy31
      - icon: envelope
        href: mailto:hyan86652@gmail.com
