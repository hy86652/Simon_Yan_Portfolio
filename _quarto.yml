project:
  type: website
  output-dir: docs

website:
  title: "Simon Yan | Portfolio"
  description: "Data Science & AI Assurance | Cornell University MPS"
  favicon: assets/img/favicon.ico   # 没有 favicon 可删此行

  # ── 导航栏 ──────────────────────────────────────────
  navbar:
    background: "#1a365d"
    foreground: "#ffffff"
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: projects.qmd
        text: Projects
      # - href: blog.qmd
      #   text: Blog
      #- href: resume.qmd
      #  text: Resume
      # - href: contact.qmd
      #   text: Contact
    right:
      - icon: github
        href: https://github.com/hy86652
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/sy31
        aria-label: LinkedIn

  # ── 页脚 ────────────────────────────────────────────
  page-footer:
    background: "#1a365d"
    foreground: "#a0aec0"
    left: "© 2025 Han (Simon) Yan"
    center: "Built with [Quarto](https://quarto.org)"
    right:
      - icon: github
        href: https://github.com/hy86652
      - icon: linkedin
        href: https://www.linkedin.com/in/sy31
      - icon: envelope
        href: mailto:hyan86652@gmail.com

  # ── Open Graph ──────────────────────────────────────
  open-graph:
    title: "Simon Yan | Portfolio"
    description: "Data Science & AI Assurance | Cornell University MPS"

  # ── 回到顶部按钮（全站注入）────────────────────────
  body-footer: |
    <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"
      aria-label="Back to top" title="Back to top">↑</button>
    <script>
    window.addEventListener('scroll', () => {
      document.getElementById('back-to-top').classList
        .toggle('visible', window.scrollY > 400);
    });
    </script>

# ── 全局 HTML 格式 ──────────────────────────────────
format:
  html:
    theme: cosmo
    css: styles.css
    toc: false        # 不渲染目录
    toc-depth: 0      # 不扫描标题
    smooth-scroll: true
    link-external-newwindow: true
    page-layout: full